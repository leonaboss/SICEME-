{% extends 'base_auth.html' %}

{% block title %}Restablecer Contraseña{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <h3 class="fw-bold" style="color: var(--primary);">Restablecer Contraseña</h3>
    <p class="text-muted small">Ingresa tu correo y te enviaremos las instrucciones.</p>
</div>

<form method="post" class="login-form">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_email" class="form-label fw-semibold">
            <i class="bi bi-envelope"></i> Correo Electrónico
        </label>
        <input type="email" name="email" class="form-control" id="id_email" placeholder="ejemplo@correo.com" required>
    </div>
    <button type="submit" class="btn-login mt-2">
        <i class="bi bi-send-fill"></i> Enviar Instrucciones
    </button>
</form>

<div class="text-center mt-3">
    <a href="{% url 'login' %}" class="text-decoration-none" style="color: var(--primary); font-size: 0.85rem;">
        Volver al inicio de sesión
    </a>
</div>
{% endblock %}

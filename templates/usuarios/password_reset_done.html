{% extends 'base_auth.html' %}

{% block title %}Correo Enviado{% endblock %}

{% block content %}
<div class="text-center p-4">
    <div class="mb-4">
        <i class="bi bi-envelope-check-fill text-success" style="font-size: 4rem;"></i>
    </div>
    <h3 class="fw-bold mb-3" style="color: var(--primary);">¡Correo Enviado!</h3>
    <p class="text-muted">Hemos enviado las instrucciones a tu bandeja de entrada.</p>
    <p class="text-muted small">Si no lo recibes, revisa tu carpeta de spam.</p>

    <div class="mt-4">
        <a href="{% url 'login' %}" class="btn-login text-decoration-none d-block">
            <i class="bi bi-arrow-left"></i> Volver al Login
        </a>
    </div>
</div>
{% endblock %}

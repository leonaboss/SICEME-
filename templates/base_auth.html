{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICEME - {% block title %}Autenticación{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}?v=2">
    <link rel="shortcut icon" type="image/png" href="{% static 'img/favicon.png' %}?v=2">
    <link rel="apple-touch-icon" href="{% static 'img/favicon.png' %}?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-logo">
                <img src="{% static 'img/logo_unefm.png' %}" alt="SICEME Logo">
                <h1>SICEME</h1>
                <p>Sistema Integral de Control Epidemiológico</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert-siceme {{ message.tags }}" style="margin-bottom: 16px;">
                <i
                    class="bi {% if message.tags == 'error' %}bi-exclamation-triangle-fill{% elif message.tags == 'success' %}bi-check-circle-fill{% else %}bi-info-circle-fill{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            {% block content %}
            {% endblock %}

            <div class="text-center mt-4" style="font-size:0.75rem; color:var(--text-muted);">
                Fondo Mutualidad UNEFM &bull; SICEME v1.0
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
